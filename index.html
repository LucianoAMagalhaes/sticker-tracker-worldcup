<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acompanhe sua coleção de figurinhas do álbum Panini da Copa do Mundo 2022.">
  <meta name="theme-color" content="#8d1538">
  <title>Sticker Tracker — Álbuns da Copa do Mundo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23fff' stroke='%238d1538' stroke-width='2.5'/><polygon points='16,8 22,12.5 19.7,19.5 12.3,19.5 10,12.5' fill='%238d1538'/></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__intro">
      <h1>Álbum da Copa do Mundo</h1>
      <p class="site-tagline">Acompanhe sua coleção de figurinhas</p>
    </div>
    <label class="album-picker">
      <span class="album-picker__label">Álbum</span>
      <select id="album-selector" class="album-picker__select" aria-label="Selecionar álbum"></select>
    </label>
  </header>

  <main class="site-main">
    <section id="progress-overview" class="overview" aria-label="Progresso geral">
      <div id="overview-display" class="overview__display">
        <p class="overview__status">Carregando álbum...</p>
      </div>
      <div class="overview__actions">
        <button type="button" id="export-btn" class="action">Exportar coleção</button>
        <button type="button" id="import-btn" class="action">Importar coleção</button>
        <input type="file" id="import-file" accept="application/json,.json" hidden>
        <p id="action-feedback" class="overview__feedback" role="status" hidden></p>
      </div>
    </section>

    <nav id="groups-nav" class="groups-nav" aria-label="Navegação por grupo">
      <!-- group list rendered by JS -->
    </nav>

    <section id="content-area" class="content" aria-labelledby="content-title">
      <h2 id="content-title" class="content__title">Selecione uma seleção</h2>
      <div id="content-filters" class="content__filters" role="toolbar" aria-label="Filtros" hidden>
        <button type="button" class="filter" data-filter="all">Todas</button>
        <button type="button" class="filter" data-filter="missing">Faltantes</button>
        <button type="button" class="filter" data-filter="owned">Obtidas</button>
        <button type="button" class="filter" data-filter="duplicate">Repetidas</button>
      </div>
      <div id="stickers-container" class="stickers">
        <p class="content__placeholder">As figurinhas aparecerão aqui em breve.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Dados armazenados localmente no seu navegador.</p>
  </footer>

  <script src="js/main.js" type="module"></script>
</body>
</html>
